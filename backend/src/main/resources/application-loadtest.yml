# Profile for rate limiter load testing (Gatling + fail-open integration test).
# Low capacities so scenarios finish quickly. The app boots against an in-memory H2
# database so no external Postgres is required — the always-on security layer needs a
# real UserRepository bean (JPA), so the datasource/JPA stack must stay enabled. Redis
# is the only external service the load tests actually exercise.
spring:
  autoconfigure:
    exclude:
      # Flyway stays off; the schema is created from JPA entities via ddl-auto below.
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
  datasource:
    url: jdbc:h2:mem:loadtest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      # Empty in-memory DB → let Hibernate build the schema from the @Entity classes.
      ddl-auto: create-drop
  data:
    redis:
      # Fail fast when Redis is unreachable so the fail-open path triggers quickly.
      timeout: 2s
  ai:
    ollama:
      init:
        # Never reach out to Ollama at startup during load tests.
        pull-model-strategy: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

ratelimit:
  fail-open: true
  excluded-paths:
    - "/actuator/health"
    # The load-test harness registers/logs in its test users over these endpoints;
    # keep them off the limiter so those setup calls never consume a bucket.
    - "/api/v1/auth/**"
  default-policy:
    path: "/**"
    capacity: 100
    refill-tokens: 100
    refill-period-seconds: 60
  policies:
    - path: "/api/search/**"
      capacity: 10
      refill-tokens: 10
      refill-period-seconds: 60
