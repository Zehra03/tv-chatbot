spring:
  ai:
    # No real chat model in this profile — AiConfig provides a mock ChatModel. 'none' keeps both the
    # OpenAI(Gemini) and Ollama chat autoconfigs from creating a competing ChatModel bean.
    model:
      chat: none
      embedding: none
    ollama:
      chat:
        enabled: false
  autoconfigure:
    exclude:
      - org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaEmbeddingAutoConfiguration
