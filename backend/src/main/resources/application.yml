spring:
  application:
    name: paxassist-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/paxassist}
    username: ${SPRING_DATASOURCE_USERNAME:paxassist_user}
    password: ${SPRING_DATASOURCE_PASSWORD:paxassist_password}
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      "[hibernate.format_sql]": true
    open-in-view: false
  flyway:
    enabled: false
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      init:
        pull-model-strategy: when_missing
        embedding:
          include: false
      chat:
        model: ${AI_PROVIDER_MODEL:gemma3:4b}
        options:
          temperature: 0.0
          num-predict: 1024

server:
  port: ${SERVER_PORT:${BACKEND_PORT:8080}}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origin: ${FRONTEND_ORIGIN:http://localhost:5173}
  # Hotel modülünün TourVisio istemcisi (@Profile("!mock")) app.tourvisio.* bekler;
  # flight modülü ise kök tourvisio.* okur. İkisi de aynı env değişkenlerinden beslenir —
  # bu blok olmadan dev profili "Could not resolve placeholder 'app.tourvisio.url'" ile açılamıyor.
  tourvisio:
    url: ${TOURVISIO_URL:https://test-service.tourvisio.com/v2/api}
    agency: ${TOURVISIO_AGENCY:}
    user: ${TOURVISIO_USER:}
    password: ${TOURVISIO_PASSWORD:}
  rate-limit:
    max-requests: 60
    window-seconds: 60
  auth:
    jwt:
      # Dev-only default; production MUST override via AUTH_JWT_SECRET (never commit a real secret).
      secret: ${AUTH_JWT_SECRET:dev-only-insecure-secret-change-me-please-32bytes+}
      expiration-minutes: ${AUTH_JWT_EXPIRATION_MINUTES:60}
      issuer: paxassist
  cache:
    default-ttl-minutes: 10
    hotel-ttl-minutes: 5
    flight-ttl-minutes: 5
  # Validator (second LLM layer, judges the main LLM's draft answer). Deliberately local/open-source
  # and decoupled from the main chat model's config below — see validator/config/ValidatorConfig.java.
  validator:
    enabled: ${VALIDATOR_ENABLED:true}
    ab-test-enabled: ${VALIDATOR_AB_TEST_ENABLED:false}
    max-retries: ${VALIDATOR_MAX_RETRIES:2}
    temperature: ${VALIDATOR_TEMPERATURE:0.0}
    max-tokens: ${VALIDATOR_MAX_TOKENS:256}
    model: ${VALIDATOR_MODEL:qwen2.5:3b}

tourvisio:
  url: ${TOURVISIO_URL:https://test-service.tourvisio.com/v2/api}
  culture: ${TOURVISIO_CULTURE:en-US}
  timezone: ${TOURVISIO_TIMEZONE:Europe/Istanbul}
  agency: ${TOURVISIO_AGENCY:}
  user: ${TOURVISIO_USER:}
  password: ${TOURVISIO_PASSWORD:}
