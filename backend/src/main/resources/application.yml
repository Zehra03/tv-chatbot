spring:
  application:
    name: paxassist-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/paxassist}
    username: ${SPRING_DATASOURCE_USERNAME:paxassist_user}
    password: ${SPRING_DATASOURCE_PASSWORD:paxassist_password}
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      "[hibernate.format_sql]": true
    open-in-view: false
  flyway:
    enabled: true
    # Enabled repo-wide: production/default profile runs V1__initial_schema.sql against Postgres,
    # then JPA ddl-auto=validate checks the entities against it. Test profiles that use H2 or an
    # empty DB exclude FlywayAutoConfiguration (see application-loadtest.yml / application-mock.yml)

  ai:
    # Spring AI 1.0 model selection: main chat + intent extraction run on the OpenAI-compatible
    # Gemini endpoint; embeddings off. The Validator keeps its OWN Ollama client (validator/config),
    # which reads OLLAMA_BASE_URL directly and is unaffected by this selection.
    #
    # PaxAssist only uses the CHAT model. The OpenAI starter also auto-configures audio-speech,
    # audio-transcription, image and moderation models with matchIfMissing=true, and each of those
    # beans throws "OpenAI API key must be set" at construction when no key is present. We never use
    # them, so switch them off — otherwise the context fails to start whenever GEMINI_API_KEY is
    # unset (e.g. the hermetic mock/mock-ai/loadtest test profiles on CI).
    model:
      chat: openai
      embedding: none
      image: none
      moderation: none
      audio:
        speech: none
        transcription: none
    openai:
      api-key: ${GEMINI_API_KEY:dummy-key}
      # Gemini's OpenAI-compatible base already ends in /v1beta/openai, so completions-path is just
      # /chat/completions (Spring AI requests base-url + completions-path).
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai}
      chat:
        completions-path: /chat/completions
        options:
          model: ${AI_PROVIDER_MODEL:gemini-flash-latest}
          temperature: 0.0
    # Consumed only by the (currently disabled) Validator via OLLAMA_BASE_URL; ollama chat
    # autoconfig is off because spring.ai.model.chat=openai.
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    mcp:
      server:
        # Publishes the hotel/flight SEARCH tools over MCP (WebMVC/SSE). Search-only surface.
        # Endpoints inherit JWT security — keep them access-controlled (they bypass the chat guard).
        name: paxassist-search
        version: 0.1.0

# Kök tourvisio.* — Feign client'lar (@FeignClient url="${tourvisio.url}" path="/api") ve hotel
# @Value("${tourvisio.url}") bu değerleri okur. tourvisio.url = host+versiyon tabanı (.../v2);
# /api önekini flight Feign path'i ve hotel istemcisi KENDİ ekler → tam yol .../v2/api/... olur.
# Default'lar sayesinde placeholder TOURVISIO_URL env olmadan da (ör. CI'daki `mvn test`) çözülür.
tourvisio:
  url: ${TOURVISIO_URL:https://test-service.tourvisio.com/v2}
  # culture = pricesearch/autocomplete Culture; timezone interprets TourVisio's offset-less flight
  # times (e.g. 2022-02-11T09:35:00). timezone MUST be set or TourVisioFlightResponseMapper skips
  # every flight ("Missing tourvisio timezone") and search returns []. Defaults keep it working
  # without extra env; override per-deployment via TOURVISIO_CULTURE / TOURVISIO_TIMEZONE.
  culture: ${TOURVISIO_CULTURE:en-US}
  timezone: ${TOURVISIO_TIMEZONE:Europe/Istanbul}
  agency: ${TOURVISIO_AGENCY:}
  user: ${TOURVISIO_USER:}
  password: ${TOURVISIO_PASSWORD:}

server:
  port: ${SERVER_PORT:${BACKEND_PORT:8080}}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origin: ${FRONTEND_ORIGIN:http://localhost:5173}
  auth:
    jwt:
      # Dev-only default; production MUST override via AUTH_JWT_SECRET (never commit a real secret).
      secret: ${AUTH_JWT_SECRET:dev-only-insecure-secret-change-me-please-32bytes+}
      expiration-minutes: ${AUTH_JWT_EXPIRATION_MINUTES:60}
      issuer: paxassist
    refresh-token:
      # Long-lived, DB-persisted, rotated on every /auth/refresh and revoked on logout.
      # Keep the access token short (jwt.expiration-minutes) and lean on this for continuity.
      expiration-days: ${AUTH_REFRESH_EXPIRATION_DAYS:30}
  cache:
    default-ttl-minutes: 10
    hotel-ttl-minutes: 5
    flight-ttl-minutes: 5
  # Chat "başka hangi tarihte müsait?" (DATE_ALTERNATIVES) probe. After an empty hotel search the
  # handler price-searches candidate check-in dates stepping forward from the requested date and
  # offers the ones TourVisio confirms as available. Bounded so a single ask makes at most
  # ceil(window-days / step-days) provider calls (location is resolved only once).
  date-suggestion:
    step-days: ${DATE_SUGGESTION_STEP_DAYS:2}
    window-days: ${DATE_SUGGESTION_WINDOW_DAYS:14}
    max-suggestions: ${DATE_SUGGESTION_MAX:3}
  # Validator (second LLM layer, judges the main LLM's draft answer before it reaches the user —
  # FallbackHandler wires it over OTHER-intent conversational replies). Runs on its own dedicated
  # ChatClient (validator/config/ValidatorConfig.java), independent of the main chat engine's bean.
  # Default model is gemma3:4b so it reuses the model already pulled locally; override VALIDATOR_MODEL
  # (e.g. a smaller qwen2.5:3b) once that model is available in Ollama.
  validator:
    enabled: ${VALIDATOR_ENABLED:true}
    ab-test-enabled: ${VALIDATOR_AB_TEST_ENABLED:false}
    max-retries: ${VALIDATOR_MAX_RETRIES:2}
    temperature: ${VALIDATOR_TEMPERATURE:0.0}
    max-tokens: ${VALIDATOR_MAX_TOKENS:256}
    model: ${VALIDATOR_MODEL:gemma3:4b}
  # Stateful guard rule: temporarily blocks a user who sends too many CONSECUTIVE out-of-scope
  # (OTHER intent) messages. A real hotel/flight (any non-OTHER) turn resets the streak. Redis-backed
  # (guard.OutOfScopeGuard); fails open when Redis is unavailable so it never blocks a real user.
  guard:
    out-of-scope:
      enabled: ${GUARD_OOS_ENABLED:true}
      threshold: ${GUARD_OOS_THRESHOLD:5}              # consecutive OTHER turns → block
      window-seconds: ${GUARD_OOS_WINDOW_SECONDS:1800} # 30 min sliding streak window
      block-duration-seconds: ${GUARD_OOS_BLOCK_SECONDS:900} # 15 min temporary block
      fail-open: ${GUARD_OOS_FAIL_OPEN:true}

ratelimit:
  # When true, a rate limiter failure (e.g. Redis unavailable) lets requests through.
  fail-open: true
  # Ant path patterns that bypass rate limiting entirely. Structure only — none yet.
  excluded-paths: []
  # Fallback policy applied when no entry in `policies` matches the request path.
  default-policy:
    path: "/**"
    capacity: 60
    refill-tokens: 60
    refill-period-seconds: 60
  # Specific rules; the most specific matching path wins over the default policy.
  # Paths target the REAL /api/v1 endpoints (chat = LLM-backed, hotels/flights = TourVisio-backed),
  # so the expensive routes get a tighter cap than the /** default. The loadtest profile keeps its
  # own /api/search/** policy in application-loadtest.yml. Reservation (/api/v1/reservations/**) is
  # not implemented yet; add a tight policy (e.g. cap 10) when that endpoint lands.
  policies:
    - path: "/api/v1/chat/**"
      capacity: 30
      refill-tokens: 30
      refill-period-seconds: 60
    - path: "/api/v1/hotels/**"
      capacity: 30
      refill-tokens: 30
      refill-period-seconds: 60
    - path: "/api/v1/flights/**"
      capacity: 30
      refill-tokens: 30
      refill-period-seconds: 60
