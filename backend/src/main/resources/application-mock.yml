spring:
  # Flyway is enabled repo-wide, but this lightweight context test boots against an empty CI
  # Postgres with no schema management (ddl-auto=none below), so keep it off here. Reliable scalar
  # guard (spring.autoconfigure.exclude is a list a later profile can replace). Real Flyway+validate
  # coverage lives in ChatPersistencePostgresTest. PaxAssistApplicationTests only calls contextLoads().
  flyway:
    enabled: false
  ai:
    ollama:
      chat:
        enabled: false
  autoconfigure:
    exclude:
      - org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaEmbeddingAutoConfiguration
  jpa:
    hibernate:
      ddl-auto: none
