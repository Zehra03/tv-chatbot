spring:
  ai:
    ollama:
      chat:
        enabled: false
  autoconfigure:
    exclude:
      - org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaEmbeddingAutoConfiguration
  jpa:
    hibernate:
      # CI's Postgres container starts empty (Flyway is disabled repo-wide - see root
      # application.yml comment); ddl-auto=validate on a schema-less DB fails context
      # startup for PaxAssistApplicationTests as soon as any @Entity exists.
      ddl-auto: none
