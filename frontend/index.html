<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Tema, React boyamadan ÖNCE <html>'e yazılmalı; yoksa ilk kare varsayılan
      // temayla çizilip sonra kullanıcının tercihine atlar (FOUC). Bu yüzden
      // senkron ve <head>'in başında — stil sayfalarından da önce.
      //
      // src/app/theme.tsx ile AYNI sözleşme: anahtar 'pax-theme', varsayılan 'dark'.
      // İKİSİ BİRLİKTE DEĞİŞİR — boyama fazları bitince ikisi de 'system' olacak.
      ;(function () {
        try {
          var s = localStorage.getItem('pax-theme')
          var t = s === 'light' || s === 'dark' || s === 'system' ? s : 'dark'
          var dark =
            t === 'dark' ||
            (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)
          if (dark) document.documentElement.classList.add('dark')
        } catch (e) {
          // storage/matchMedia erişilemiyorsa varsayılana (koyu) düş.
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- brand-navy; tarayıcı çubuğu gece uçuşu yüzeyiyle bütünleşir (HTML — tailwind theme() erişilemez). -->
    <meta name="theme-color" content="#0B234A" />
    <meta
      name="description"
      content="PaxAssist — TourVisio API ile AI destekli otel ve uçuş arama ve kontrollü rezervasyon asistanı."
    />
    <title>PaxAssist — AI Seyahat Asistanı</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
