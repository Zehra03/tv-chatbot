name: paxassist

services:
  postgres:
    image: postgres:16-alpine
    container_name: paxassist-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: paxassist-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_PORT: ${BACKEND_PORT}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      AI_PROVIDER_MODEL: ${AI_PROVIDER_MODEL}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      AUTH_JWT_EXPIRATION_MINUTES: ${AUTH_JWT_EXPIRATION_MINUTES}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    # Container is "healthy" only once Spring's actuator reports UP (datasource + Flyway ok).
    # start_period is generous: on this host a cold start while other containers boot has been
    # observed up to ~170s (springdoc init + JIT). Probe failures during start_period don't flip
    # the container to unhealthy, so err large to avoid false-unhealthy during a slow boot.
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:${BACKEND_PORT}/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 180s

  redis:
    image: redis:7.2-alpine
    container_name: paxassist-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #     args:
  #       VITE_API_BASE_URL: ${VITE_API_BASE_URL}
  #   container_name: paxassist-frontend
  #   restart: unless-stopped
  #   depends_on:
  #     - backend
  #   ports:
  #     - "${FRONTEND_PORT}:80"

volumes:
  postgres-data:
  redis-data:
